name: tower_desktop_app
description: 多门店报菜&菜单权限管理桌面客户端
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  provider: ^6.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  collection: ^1.18.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  
  # Fluent UI 组件库
  fluent_ui: ^4.9.1
  bitsdojo_window: ^0.1.6
  window_manager: ^0.3.9
  
  # 系统托盘
  tray_manager: ^0.2.3
  
  # SVG 支持
  flutter_svg: ^2.0.10
  
  # 截图和文件保存
  screenshot: ^3.0.0
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2

  # UI & helper 可后续添加

  # 路由（可替换为 go_router，这里先用基础 Navigator）

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/core/icons/
